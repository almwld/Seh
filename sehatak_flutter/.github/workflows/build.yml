name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    - run: |
        cd sehatak_flutter
        flutter pub get
        flutter build apk --release
    - uses: actions/upload-artifact@v4
      with:
        name: app
        path: sehatak_flutter/build/app/outputs/flutter-apk/app-release.apk
